version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: gallery-db-v2
    restart: unless-stopped
    volumes:
      - /mnt/apps/newweddingsbymarkgallery/db:/data/db
    networks:
      - gallery-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: https://github.com/valianktni1/couples-gallery-new-clone-main.git#main:gallery-v2/backend
      dockerfile: Dockerfile
    container_name: gallery-api-v2
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - /mnt/apps/newweddingsbymarkgallery/thumbnails:/app/data/thumbnails
      - /mnt/apps/newweddingsbymarkgallery/previews:/app/data/previews
      - /mnt/nextcloud/newwedidngsbymarkuserfiles:/app/files
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=couples_gallery
      - SECRET_KEY=change-this-secret-in-production-please
      - FILES_DIR=/app/files
      - THUMBNAILS_DIR=/app/data/thumbnails
    networks:
      - gallery-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/api/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: https://github.com/valianktni1/couples-gallery-new-clone-main.git#main:gallery-v2/frontend
      dockerfile: Dockerfile
    container_name: gallery-web-v2
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gallery-network

  nginx-gateway:
    image: nginx:alpine
    container_name: gallery-gateway-v2
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "3038:80"
    command: >
      /bin/sh -c "printf 'server { listen 80; location /api/ { proxy_pass http://backend:8001; proxy_set_header Host \044host; proxy_set_header X-Real-IP \044remote_addr; } location / { proxy_pass http://frontend:3000; proxy_set_header Host \044host; proxy_set_header Upgrade \044http_upgrade; proxy_set_header Connection \"upgrade\"; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - gallery-v2-network

networks:
  gallery-v2-network:
    driver: bridge
